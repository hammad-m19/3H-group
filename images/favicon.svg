<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 55" width="50" height="55">
    <defs>
        <linearGradient id="gradLeft" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradCenter" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#F43F5E;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#E63946;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Left Pillar -->
    <polygon points="0,10 8,0 16,10" fill="#1E3A8A" />
    <rect x="0" y="10" width="16" height="45" fill="url(#gradLeft)" />
    
    <!-- Center Pillar -->
    <polygon points="19,10 25,0 31,10" fill="#E63946" />
    <rect x="19" y="10" width="12" height="45" fill="url(#gradCenter)" />
    
    <!-- Right Pillar -->
    <polygon points="34,10 42,0 50,10" fill="#1E3A8A" />
    <rect x="34" y="10" width="16" height="45" fill="url(#gradLeft)" />
</svg>
